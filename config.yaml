# 拼团营销系统配置
# 环境变量优先级高于 YAML（如 DB_HOST 覆盖 mysql.host）

server:
  port: 8080
  mode: debug  # debug | release | test
  read_timeout: 10s
  write_timeout: 10s

mysql:
  host: 127.0.0.1
  port: 3306
  user: dev
  password: dev123
  database: group_buy_market
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 300s

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

log:
  level: debug  # debug | info | warn | error
  format: text  # text | json

app:
  name: group-buy
  lock_result_ttl: 600     # 锁单结果缓存 TTL（秒）
  order_lock_ttl: 3        # 分布式锁 TTL（秒）
  notify_max_retry: 5      # 回调最大重试次数
  timeout_scan_interval: 30 # 超时扫描间隔（秒）

# 支付宝沙箱配置（可选，不配置则使用 Mock 支付网关）
alipay:
  app_id: "9021000156674325"              # 沙箱应用 APPID
  private_key: ""         # 应用私钥（PEM 内容或文件路径，需 PKCS1 格式）
  alipay_public_key: ""   # 支付宝公钥（上传应用公钥后从沙箱页面获取）
  notify_url: "http://42.192.113.117:8080/api/v1/pay/notify"          # 异步回调地址（支付宝 POST 通知到此，需公网可达）
  return_url: "https://chat.deepseek.com/"          # PC 支付后同步跳转地址（可选）
  sandbox: true           # true=沙箱, false=正式
  sign_type: RSA2         # 签名算法