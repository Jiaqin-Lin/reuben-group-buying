# 拼团营销系统配置
#
# 敏感值（密码、密钥等）通过环境变量注入，见 .env.example
# 环境变量优先级高于此文件（如 MYSQL_PASSWORD 覆盖 mysql.password）

server:
  port: 8081
  mode: debug  # debug | release | test
  read_timeout: 10s
  write_timeout: 10s

mysql:
  host: 127.0.0.1
  port: 3306
  user: dev
  # password 通过 MYSQL_PASSWORD 环境变量注入
  database: group_buy_market
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 300s

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

log:
  level: debug  # debug | info | warn | error
  format: json  # text | json

app:
  name: group-buy
  lock_result_ttl: 600     # 锁单结果缓存 TTL（秒）
  order_lock_ttl: 15       # 分布式锁 TTL（秒），需大于支付宝 HTTP 超时
  notify_max_retry: 5      # 回调最大重试次数
  notify_scan_interval: 60    # 通知扫描间隔（秒），RocketMQ 发送失败+HTTP 重试兜底
  timeout_scan_interval: 300  # 超时扫描间隔（秒），延迟消息的低频兜底
  # admin_token 通过 ADMIN_TOKEN 环境变量注入

rocketmq:
  name_server: "127.0.0.1:9876"
  producer_group: "group_buy_producer"
  consumer_group: "group_buy_timeout_consumer"
  topic: "group_buy_market_topic"

# 支付宝沙箱配置（通过环境变量注入，不填则使用 Mock 支付网关）
#   ALIPAY_APP_ID / ALIPAY_PRIVATE_KEY / ALIPAY_PUBLIC_KEY
#   ALIPAY_NOTIFY_URL / ALIPAY_RETURN_URL
alipay:
  sandbox: true
  sign_type: RSA2
