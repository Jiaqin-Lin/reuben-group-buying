services:
  mysql:
    image: mysql:8.0
    container_name: group-buy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: group_buy_market
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: group-buy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  namesrv:
    image: apache/rocketmq:5.3.2
    container_name: group-buy-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  broker:
    image: apache/rocketmq:5.3.2
    container_name: group-buy-broker
    restart: unless-stopped
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      NAMESRV_ADDR: namesrv:9876
    command: sh mqbroker -n namesrv:9876 --enable-proxy
    depends_on:
      - namesrv

  app:
    build: .
    container_name: group-buy-app
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - GIN_MODE=release
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=dev
      - MYSQL_PASSWORD=dev123
      - MYSQL_DATABASE=group_buy_market
      - REDIS_ADDR=redis:6379
      - ROCKETMQ_NAME_SERVER=namesrv:9876
      # 支付宝密钥（二选一）：
      #   A. 环境变量：设置 ALIPAY_PRIVATE_KEY 为 PEM 内容或 base64
      #   B. 文件挂载：把 config.yaml 的 alipay.private_key 改为文件路径（如 /run/secrets/alipay_private_key）
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: group-buy-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:10.4.0
    container_name: group-buy-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./docker/grafana/datasources/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./docker/grafana/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./docker/grafana/dashboards/group-buy.json:/var/lib/grafana/dashboards/group-buy.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  rocketmq_data:
  prometheus_data:
  grafana_data:
